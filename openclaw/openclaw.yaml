project:
  name: ai-factory
  version: 1.0

models:
  qwen_brain:
    provider: local
    model: qwen3.5-9b

  qwen_audit:
    provider: local
    model: qwen3.5-9b

agents:
  - brain_agent
  - engine_agent
  - audit_agent
  - inventory_agent
  - production_agent

workflows:
  email_auto_order:
    description: Auto read email and process orders
    entry: backend/workflows/email_to_parts_flow.py

schedule:
  email_auto_order:
    type: interval
    minutes: 5